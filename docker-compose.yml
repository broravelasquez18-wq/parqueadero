version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=parqueadero_db
      - DB_USER=root
      - DB_PASS=${DB_PASS}
      - SMS_ENVIO_ACTIVO=true
      - SMS_PROVIDER=android
      # Reemplaza los valores de abajo con las credenciales de tu app en el despliegue
      - ANDROID_GATEWAY_URL=https://api.sms-gate.app/3rdparty/v1
      - ANDROID_GATEWAY_USER=tu_usuario_de_la_app
      - ANDROID_GATEWAY_PASSWORD=tu_contrasena_de_la_app
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - db

  db:
    image: mysql:8
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=parqueadero_db
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
